services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: furnaceflow-backend:latest
    container_name: furnaceflow-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set -- did you forget --env-file .env.local|.env.deploy?}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ENV: ${ENV:-production}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped
    networks: [furnaceflow_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: furnaceflow-frontend:latest
    container_name: furnaceflow-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks: [furnaceflow_net]

  db:
    image: postgres:16-alpine
    container_name: furnaceflow-db
    profiles: ["local"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-furnaceflow}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-furnaceflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [furnaceflow_net]

volumes:
  pgdata:

networks:
  furnaceflow_net:
    driver: bridge
